<!DOCTYPE html>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.3/codemirror.min.js"
    integrity="sha512-XMlgZzPyVXf1I/wbGnofk1Hfdx+zAWyZjh6c21yGo/k1zNC4Ve6xcQnTDTCHrjFGsOrVicJsBURLYktVEu/8vQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.3/mode/python/python.min.js"

    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <link rel='stylesheet' type='text/css' href='index.css'>

<body>
  <h1>
    <span class="hybrid-debugger-title">Blockly Hybrid Debugger</span>
    Based on
    <u><span class="original-debugger-title"><a
          href='https://github.com/krystalsavv/Complete-Block-Level-Visual-Debugger-for-Blockly'>
          Complete Block Level Visual Debugger for Blockly </span></a></u>
  </h1>

  <div class="container-fluid">
    <div id='action_bar' class="sticky">
      <h4>Complete Debugger Controls:</h4>
      <button id='StartButton' class="original-debugger-button" tip="Start the debugging process">Start
        Debugging</button>
      <button id='StepInButton' class="original-debugger-button" tip="Step into next inner block">Step In</button>
      <button id='StepOverButton' class="original-debugger-button" tip="Step over next block">Step Over</button>
      <button id='StepParentButton' class="original-debugger-button" tip="Step to the parent of current block">Step
        Parent</button>
      <button id='StepOutButton' class="original-debugger-button" tip="Step out of current block">Step Out</button>
      <button id='ContinueButton' class="original-debugger-button" tip="Continue to next Breakpoint">Continue</button>
      <button id='StopButton' class="original-debugger-button"
        tip="Stop the debugging process and clear last run">Stop</button>
    </div>

    <div id='tools_bar'>
      <h4>Hybrid Debugger Tools:</h4>
      <button id="SnapshotMenuButton" class="hybrid-debugger-background" tip="Add/Remove/Load Snapshots">Snapshot
        Menu</button>
      <button id="StatisticsMenuButton" class="hybrid-debugger-background" tip="Show program runs statistics">Statistics
        Menu</button>
      <button id="ExportBreakpointsButton" class="hybrid-debugger-background"
        tip="Export a BreakpointIO (VS Code Extension) JSON to the Clipboard">BreakpointIO Export</button>
      <button id="new-blockly-workspace-btn" class="hybrid-debugger-background" tip="Add a new blockly workspace">
        Add Blockly Workspace</button>
    </div>



    <div id="SnapshotMenuModal" class="modal">
      <div class="modal-content">
        <span class="modal-close-button snapshot-menu-close-button">&times;</span>
        <div>
          <button id='LoadXMLtoBlocklyButton' class="hybrid-debugger-background"
            tip="Load current XML configuration the second Blockly workspace">Load XML to Blockly Workspace</button>
          <button id="saveSnapshotButton" class="hybrid-debugger-background"
            tip="Save a snapshot of the current worksapce">Save Snapshot</button>
          <button id="logSnapshotsButton" class="hybrid-debugger-background"
            tip="Console log metadata array of all existing snapshots">Log Snapshot Metadata</button>
        </div>
        <div id="savedButtonsContainer"></div>
        <code contenteditable="true" id="XML_paragraph" style="white-space: pre-wrap"></code>
      </div>
    </div>

    <div id="StatisticsMenuModal" class="modal">
      <div class="modal-content">
        <span class="modal-close-button statistics-menu-close-modal">&times;</span>
        <h1 id="run-counter" style="font-size: 20px;">Run Counter: 0</h1>
        <div id="stats-runs"></div>
      </div>
    </div>
    </p>

    
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-6">
          <div id='blocklyDiv' class="blockly-workspace" style='padding-left: 15px;'></div>
        </div>
        <div class="col-md-6">
          <div id='val_table'></div>
        </div>
      </div>
    </div>
    <br>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-6">
          <div id='blocklyDiv2' class="blockly-workspace"  style='padding-left: 15px;'></div>
        </div>

        <div class="col-md-6">
          <div class="container">
            <label for="language_options"><strong>Select a Programming language:</strong></label>
            <select id="language_options" class="hybrid-debugger-background" style="font-weight:bold;">
              <option value="JavaScript">JavaScript</option>
              <option value="Python">Python</option>
              <option value="Dart">Dart</option>
              <option value="PHP">PHP</option>
              <option value="Lua">Lua</option>
            </select>
            <!-- <p id="selected_language_option">Selected option: None</p> -->
          </div>

          <div class="container-fluid">
            <div class="row">
              <div class="col-md-12 editor-wrapper">
                <ul class="nav nav-tabs hybrid-debugger-background">
                  <li class="nav-item">
                    <button class="nav-link active" id="JSTab" href="#tab1" value="JavaScript">JavaScript</button>
                  </li>
                </ul>
                <div class="tab-content">
                  <div id="tab1" class="tab-pane fade">
                  </div>
                  <textarea id="javascript_code" name="javascript_code"></textarea>
                </div>
              </div>

              <div class="col-md-12 editor-wrapper">
                <ul class="nav nav-tabs hybrid-debugger-background">
                  <li class="nav-item">
                    <button class="nav-link active" id="PythonTab" href="#tab2" value="Python">Python</button>
                  </li>
                </ul>
                <div class="tab-content">
                  <div id="tab2" class="tab-pane fade show active">
                    <textarea id="python_code" name="python_code"></textarea>
                  </div>
                </div>
              </div>

              <div class="col-md-12 editor-wrapper">
                <ul class="nav nav-tabs hybrid-debugger-background">
                  <li class="nav-item">
                    <button class="nav-link active" id="DartTab" href="#tab3" value="Dart">Dart</button>
                  </li>
                </ul>
                <div class="tab-content">
                  <div id="tab3" class="tab-pane fade">
                  </div>
                  <textarea id="dart_code" name="dart_code"></textarea>
                </div>
              </div>

              <div class="col-md-12 editor-wrapper">
                <ul class="nav nav-tabs hybrid-debugger-background">
                  <li class="nav-item">
                    <button class="nav-link active" id="PHPTab" href="#tab3" value="PHP">PHP</button>
                  </li>
                </ul>
                <div class="tab-content">
                  <div id="tab3" class="tab-pane fade">
                  </div>
                  <textarea id="php_code" name="php_code"></textarea>
                </div>
              </div>

              <div class="col-md-12 editor-wrapper">
                <ul class="nav nav-tabs hybrid-debugger-background">
                  <li class="nav-item">
                    <button class="nav-link active" id="LuaTab" href="#tab3" value="Lua">Lua</button>
                  </li>
                </ul>
                <div class="tab-content">
                  <div id="tab3" class="tab-pane fade">
                  </div>
                  <textarea id="lua_code" name="lua_code"></textarea>
                </div>
              </div>

            </div>
          </div>

        <br><b>Unit Test:</b> <br>
        <form id="unit-test-input-form" class="form-inline">
          <label for="fname">num1=</label>
          <input type="numebr" id="num1" name="num1" placeholder="input number" required>

        <div id="monaco_container_js" style="height: 240px; width: 100%; border: 1px solid grey;">
          </div>
        </div> -->
        </div>
      </div>
      <!-- new dynamic blockly workspaces -->
      <div class="row">
        <div id="extraBlocklyWorkspaces" class="col-md-6">
        </div>
      </div>
      <br>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <xml id='toolbox' style='display: none'>
    <category id='catLogic' colour='210' name='Logic'>
      <block type='controls_if'></block>
      <block type='logic_compare'></block>
      <block type='logic_operation'></block>
      <block type='logic_negate'></block>
      <block type='logic_boolean'></block>
      <block type='logic_null'></block>
      <block type='logic_ternary'></block>
      <block type='assert_block'></block>
    </category>
    <category id='catLoops' colour='120' name='Loops'>
      <block type='controls_repeat_ext'>
        <value name='TIMES'>
          <shadow type='math_number'>
            <field name='NUM'>10</field>
          </shadow>
        </value>
      </block>
      <block type='controls_whileUntil'></block>
      <block type='controls_for'>
        <value name='FROM'>
          <shadow type='math_number'>
            <field name='NUM'>1</field>
          </shadow>
        </value>
        <value name='TO'>
          <shadow type='math_number'>
            <field name='NUM'>10</field>
          </shadow>
        </value>
        <value name='BY'>
          <shadow type='math_number'>
            <field name='NUM'>1</field>
          </shadow>
        </value>
      </block>
      <block type='controls_forEach'></block>
      <block type='controls_flow_statements'></block>
    </category>
    <category id='catMath' colour='230' name='Math'>
      <block type='math_number'></block>
      <block type='math_arithmetic'>
        <value name='A'>
          <shadow type='math_number'>
            <field name='NUM'>1</field>
          </shadow>
        </value>
        <value name='B'>
          <shadow type='math_number'>
            <field name='NUM'>1</field>
          </shadow>
        </value>
      </block>
      <block type='math_single'>
        <value name='NUM'>
          <shadow type='math_number'>
            <field name='NUM'>9</field>
          </shadow>
        </value>
      </block>
      <block type='math_trig'>
        <value name='NUM'>
          <shadow type='math_number'>
            <field name='NUM'>45</field>
          </shadow>
        </value>
      </block>
      <block type='math_constant'></block>
      <block type='math_number_property'>
        <value name='NUMBER_TO_CHECK'>
          <shadow type='math_number'>
            <field name='NUM'>0</field>
          </shadow>
        </value>
      </block>
      <block type='math_change'>
        <value name='DELTA'>
          <shadow type='math_number'>
            <field name='NUM'>1</field>
          </shadow>
        </value>
      </block>
      <block type='math_round'>
        <value name='NUM'>
          <shadow type='math_number'>
            <field name='NUM'>3.1</field>
          </shadow>
        </value>
      </block>
      <block type='math_on_list'></block>
      <block type='math_modulo'>
        <value name='DIVIDEND'>
          <shadow type='math_number'>
            <field name='NUM'>64</field>
          </shadow>
        </value>
        <value name='DIVISOR'>
          <shadow type='math_number'>
            <field name='NUM'>10</field>
          </shadow>
        </value>
      </block>
      <block type='math_constrain'>
        <value name='VALUE'>
          <shadow type='math_number'>
            <field name='NUM'>50</field>
          </shadow>
        </value>
        <value name='LOW'>
          <shadow type='math_number'>
            <field name='NUM'>1</field>
          </shadow>
        </value>
        <value name='HIGH'>
          <shadow type='math_number'>
            <field name='NUM'>100</field>
          </shadow>
        </value>
      </block>
      <block type='math_random_int'>
        <value name='FROM'>
          <shadow type='math_number'>
            <field name='NUM'>1</field>
          </shadow>
        </value>
        <value name='TO'>
          <shadow type='math_number'>
            <field name='NUM'>100</field>
          </shadow>
        </value>
      </block>
      <block type='math_random_float'></block>
    </category>
    <category id='catText' colour='160' name='Text'>
      <block type='text'></block>
      <block type='text_join'></block>
      <block type='text_append'>
        <value name='TEXT'>
          <shadow type='text'></shadow>
        </value>
      </block>
      <block type='text_length'>
        <value name='VALUE'>
          <shadow type='text'>
            <field name='TEXT'>abc</field>
          </shadow>
        </value>
      </block>
      <block type='text_isEmpty'>
        <value name='VALUE'>
          <shadow type='text'>
            <field name='TEXT'></field>
          </shadow>
        </value>
      </block>
      <block type='text_indexOf'>
        <value name='VALUE'>
          <block type='variables_get'>
            <field name='VAR'>text</field>
          </block>
        </value>
        <value name='FIND'>
          <shadow type='text'>
            <field name='TEXT'>abc</field>
          </shadow>
        </value>
      </block>
      <block type='text_charAt'>
        <value name='VALUE'>
          <block type='variables_get'>
            <field name='VAR'>text</field>
          </block>
        </value>
      </block>
      <block type='text_getSubstring'>
        <value name='STRING'>
          <block type='variables_get'>
            <field name='VAR'>text</field>
          </block>
        </value>
      </block>
      <block type='text_changeCase'>
        <value name='TEXT'>
          <shadow type='text'>
            <field name='TEXT'>abc</field>
          </shadow>
        </value>
      </block>
      <block type='text_trim'>
        <value name='TEXT'>
          <shadow type='text'>
            <field name='TEXT'>abc</field>
          </shadow>
        </value>
      </block>
      <block type='text_print'>
        <value name='TEXT'>
          <shadow type='text'>
            <field name='TEXT'>abc</field>
          </shadow>
        </value>
      </block>
      <block type='text_prompt_ext'>
        <value name='TEXT'>
          <shadow type='text'>
            <field name='TEXT'>abc</field>
          </shadow>
        </value>
      </block>
    </category>
    <category id='catLists' colour='260' name='Lists'>
      <block type='lists_create_with'>
        <mutation items='0'></mutation>
      </block>
      <block type='lists_create_with'></block>
      <block type='list_range'></block>
      <block type='lists_repeat'>
        <value name='NUM'>
          <shadow type='math_number'>
            <field name='NUM'>5</field>
          </shadow>
        </value>
      </block>
      <block type='lists_length'></block>
      <block type='lists_isEmpty'></block>
      <block type='lists_indexOf'>
        <value name='VALUE'>
          <block type='variables_get'>
            <field name='VAR'>list</field>
          </block>
        </value>
      </block>
      <block type='lists_getIndex'>
        <value name='VALUE'>
          <block type='variables_get'>
            <field name='VAR'>list</field>
          </block>
        </value>
      </block>
      <block type='lists_setIndex'>
        <value name='LIST'>
          <block type='variables_get'>
            <field name='VAR'>list</field>
          </block>
        </value>
      </block>
      <block type='lists_getSublist'>
        <value name='LIST'>
          <block type='variables_get'>
            <field name='VAR'>list</field>
          </block>
        </value>
      </block>
      <block type='lists_split'>
        <value name='DELIM'>
          <shadow type='text'>
            <field name='TEXT'>,</field>
          </shadow>
        </value>
      </block>
      <block type='lists_sort'></block>
    </category>
    <category id='catColour' colour='20' name='Color'>
      <block type='colour_picker'></block>
      <block type='colour_random'></block>
      <block type='colour_rgb'>
        <value name='RED'>
          <shadow type='math_number'>
            <field name='NUM'>100</field>
          </shadow>
        </value>
        <value name='GREEN'>
          <shadow type='math_number'>
            <field name='NUM'>50</field>
          </shadow>
        </value>
        <value name='BLUE'>
          <shadow type='math_number'>
            <field name='NUM'>0</field>
          </shadow>
        </value>
      </block>
      <block type='colour_blend'>
        <value name='COLOUR1'>
          <shadow type='colour_picker'>
            <field name='COLOUR'>#ff0000</field>
          </shadow>
        </value>
        <value name='COLOUR2'>
          <shadow type='colour_picker'>
            <field name='COLOUR'>#3333ff</field>
          </shadow>
        </value>
        <value name='RATIO'>
          <shadow type='math_number'>
            <field name='NUM'>0.5</field>
          </shadow>
        </value>
      </block>
    </category>
    <sep></sep>
    <category id='catVariables' colour='330' custom='VARIABLE' name='Variables'></category>
    <category id='catFunctions' colour='290' custom='PROCEDURE' name='Functions'></category>
  </xml>

  <xml id='startBlocks' style='display: none'></xml>
  <xml id='startBlocks2' style='display: none'></xml>

  <script>
    const first_starting_blocks_path = "starting_block_sample_2_corrected.xml";
    const second_starting_blocks_path = "starting_block_sample_4.xml";

    var xhttp = new XMLHttpRequest();
    xhttp.onreadystatechange = function () {
      if (this.readyState == 4 && this.status == 200) {
        document.getElementById('startBlocks').innerHTML = xhttp.responseText;
        dispatchEvent(new Event("loadStartingBlocks_blockly1"));
      }
    };
    xhttp.open("GET", first_starting_blocks_path, true);
    xhttp.send();

    var xhttp2 = new XMLHttpRequest();
    xhttp2.onreadystatechange = function () {
      if (this.readyState == 4 && this.status == 200) {
        document.getElementById('startBlocks2').innerHTML = xhttp2.responseText;
        dispatchEvent(new CustomEvent("loadStartingBlocks_blockly2"));
      }
    };

    xhttp2.open("GET", second_starting_blocks_path, true);
    xhttp2.send();
  </script>

  <script src='./dist/bundle.js'></script>

  <script src="https://unpkg.com/monaco-editor/min/vs/loader.js"></script>
  <script src="https://unpkg.com/monaco-editor/min/vs/editor/editor.main.nls.js"></script>
  <script src="https://unpkg.com/monaco-editor/min/vs/editor/editor.main.js"></script>

</body>
